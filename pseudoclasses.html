<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>botãozin</title>
        <style>
            button {
                border: none;
                border-radius: 16px;
                padding: 16px;
                cursor: pointer;
                background-color: aquamarine;
            }
            
            button:hover{
                background-color: blue;
            }

            a:active {
                color: green;
            }

            a:visited {
                color: brown;
            }

            input:focus {
                background-color: aquamarine;
            }

            li:first-child {
                color: blue
            }
        </style>
    </head>
    <body>
        <button>clique aqui</button>
        <a href="https://github.com">Link</a>
        <input type="text">

        <ul>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
            <li>item 4</li>
            <li>item 5</li>
            <li>item 6</li>
        </ul>

    </body>
</html>
